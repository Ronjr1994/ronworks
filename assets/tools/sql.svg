<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#53a5e5"/>
      <stop offset="100%" stop-color="#479adb"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b7ccd"/>
      <stop offset="50%" stop-color="#367fd1"/>
      <stop offset="100%" stop-color="#367fd1"/>
    </linearGradient>
    <linearGradient id="botGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e4b99"/>
      <stop offset="50%" stop-color="#1d4d9e"/>
      <stop offset="100%" stop-color="#1e4b99"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="none"/>

  <!-- bottom body -->
  <path d="M200 800
           C200 920 200 1040 200 980
           C200 1066 379 1136 600 1136
           C821 1136 1000 1066 1000 980
           C1000 1040 1000 920 1000 800
           C1000 886 821 956 600 956
           C379 956 200 886 200 800 Z"
        fill="url(#botGrad)"/>

  <!-- middle body -->
  <path d="M200 400
           C200 520 200 680 200 800
           C200 886 379 956 600 956
           C821 956 1000 886 1000 800
           C1000 680 1000 520 1000 400
           C1000 486 821 556 600 556
           C379 556 200 486 200 400 Z"
        fill="url(#midGrad)"/>

  <!-- top side band -->
  <path d="M200 200
           C200 260 200 340 200 400
           C200 486 379 556 600 556
           C821 556 1000 486 1000 400
           C1000 340 1000 260 1000 200
           C1000 286 821 356 600 356
           C379 356 200 286 200 200 Z"
        fill="url(#midGrad)"/>

  <!-- top ellipse -->
  <ellipse cx="600" cy="200" rx="400" ry="110" fill="url(#topGrad)"/>

  <!-- SQL text -->
  <text x="600" y="780"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="270"
        font-weight="700"
        fill="#f2f2f2"
        letter-spacing="4">SQL</text>
</svg>
